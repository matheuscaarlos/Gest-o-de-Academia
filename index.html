<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Judô - Dojo Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-blue-900 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold"><i class="fas fa-user-ninja mr-2"></i> Dojo System</h1>
            <span id="date-display"></span>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="bg-white p-6 rounded-lg shadow-md h-fit">
                <h2 class="text-xl font-semibold mb-4 text-blue-800 border-b pb-2">Nova Matrícula</h2>
                <form id="form-aluno" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Nome do Atleta</label>
                        <input type="text" id="nome" class="w-full p-2 border rounded shadow-sm focus:ring-blue-500" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Graduação (Faixa)</label>
                        <select id="faixa" class="w-full p-2 border rounded shadow-sm">
                            <option value="Branca">Branca</option>
                            <option value="Cinza">Cinza</option>
                            <option value="Azul">Azul</option>
                            <option value="Amarela">Amarela</option>
                            <option value="Laranja">Laranja</option>
                            <option value="Verde">Verde</option>
                            <option value="Roxa">Roxa</option>
                            <option value="Marrom">Marrom</option>
                            <option value="Preta">Preta</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Valor Mensalidade (R$)</label>
                        <input type="number" id="valor" class="w-full p-2 border rounded shadow-sm" value="100">
                    </div>
                    <button type="submit" class="w-full bg-blue-700 text-white py-2 rounded hover:bg-blue-800 transition">Matricular Aluno</button>
                </form>
            </div>

            <div class="md:col-span-2 bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-xl font-semibold mb-4 text-blue-800 border-b pb-2">Gestão de Alunos</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50">
                                <th class="p-3 border-b text-sm font-semibold text-gray-600">Atleta</th>
                                <th class="p-3 border-b text-sm font-semibold text-gray-600">Faixa</th>
                                <th class="p-3 border-b text-sm font-semibold text-gray-600">Mensalidade</th>
                                <th class="p-3 border-b text-sm font-semibold text-gray-600">Status</th>
                                <th class="p-3 border-b text-sm font-semibold text-gray-600">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="lista-alunos">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        let alunos = JSON.parse(localStorage.getItem('alunos_judo')) || [];

        const form = document.getElementById('form-aluno');
        const lista = document.getElementById('lista-alunos');

        function salvarDados() {
            localStorage.setItem('alunos_judo', JSON.stringify(alunos));
            renderizar();
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const novoAluno = {
                id: Date.now(),
                nome: document.getElementById('nome').value,
                faixa: document.getElementById('faixa').value,
                valor: document.getElementById('valor').value,
                pago: false
            };
            alunos.push(novoAluno);
            form.reset();
            salvarDados();
        });

        function alternarPagamento(id) {
            alunos = alunos.map(aluno => 
                aluno.id === id ? {...aluno, pago: !aluno.pago} : aluno
            );
            salvarDados();
        }

        function excluirAluno(id) {
            if(confirm("Deseja remover este atleta?")) {
                alunos = alunos.filter(aluno => aluno.id !== id);
                salvarDados();
            }
        }

        function renderizar() {
            lista.innerHTML = '';
            alunos.forEach(aluno => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition";
                tr.innerHTML = `
                    <td class="p-3 border-b font-medium">${aluno.nome}</td>
                    <td class="p-3 border-b"><span class="px-2 py-1 rounded text-xs font-bold bg-gray-200">${aluno.faixa}</span></td>
                    <td class="p-3 border-b text-gray-600">R$ ${aluno.valor}</td>
                    <td class="p-3 border-b">
                        <button onclick="alternarPagamento(${aluno.id})" class="px-3 py-1 rounded-full text-xs font-bold ${aluno.pago ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                            ${aluno.pago ? '<i class="fas fa-check"></i> Pago' : '<i class="fas fa-clock"></i> Pendente'}
                        </button>
                    </td>
                    <td class="p-3 border-b">
                        <button onclick="excluirAluno(${aluno.id})" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                lista.appendChild(tr);
            });
        }

        document.getElementById('date-display').innerText = new Date().toLocaleDateString('pt-br');
        renderizar();
    </script>
</body>
</html>

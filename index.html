<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dojo Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 font-sans">

    <nav class="bg-blue-900 text-white shadow-xl">
        <div class="container mx-auto px-4 flex justify-between items-center py-4">
            <div class="flex items-center gap-2">
                <i class="fas fa-user-ninja text-2xl text-yellow-400"></i>
                <h1 class="text-xl font-bold tracking-wider">DOJO MANAGER</h1>
            </div>
            <div class="flex gap-4">
                <button onclick="switchTab('cadastro')" class="hover:text-yellow-400 transition font-medium"><i class="fas fa-user-plus mr-1"></i> Matrícula</button>
                <button onclick="switchTab('financeiro')" class="hover:text-yellow-400 transition font-medium"><i class="fas fa-hand-holding-usd mr-1"></i> Financeiro</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 md:p-8">
        
        <div id="tab-cadastro" class="tab-content">
            <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
                <div class="bg-blue-800 p-4">
                    <h2 class="text-white text-lg font-bold"><i class="fas fa-id-card mr-2"></i> Ficha de Inscrição</h2>
                </div>
                <form id="form-aluno" class="p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-semibold text-gray-600">Nome Completo</label>
                        <input type="text" id="nome" class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600">Data de Nascimento</label>
                        <input type="date" id="nascimento" class="w-full p-2 border rounded" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600">WhatsApp</label>
                        <input type="tel" id="whatsapp" placeholder="(00) 00000-0000" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600">E-mail</label>
                        <input type="email" id="email" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600">Graduação (Faixa)</label>
                        <select id="faixa" class="w-full p-2 border rounded">
                            <option>Branca</option><option>Cinza</option><option>Azul</option>
                            <option>Amarela</option><option>Laranja</option><option>Verde</option>
                            <option>Roxa</option><option>Marrom</option><option>Preta</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600">Valor Mensalidade (R$)</label>
                        <input type="number" id="valor" value="120" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600">Melhor Dia de Pagamento</label>
                        <select id="vencimento" class="w-full p-2 border rounded">
                            <option value="05">Dia 05</option>
                            <option value="10">Dia 10</option>
                            <option value="15">Dia 15</option>
                            <option value="20">Dia 20</option>
                        </select>
                    </div>
                    <div class="md:col-span-2 mt-4">
                        <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 shadow-md transition">
                            FINALIZAR MATRÍCULA
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div id="tab-financeiro" class="tab-content hidden">
            <div class="bg-white rounded-xl shadow-lg overflow-hidden">
                <div class="bg-emerald-700 p-4 flex justify-between items-center text-white">
                    <h2 class="text-lg font-bold"><i class="fas fa-coins mr-2"></i> Controle de Mensalidades</h2>
                    <input type="text" id="busca" placeholder="Buscar aluno..." class="p-1 px-3 rounded text-gray-800 text-sm outline-none">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 border-b">
                                <th class="p-4 text-sm font-bold text-gray-600">Atleta</th>
                                <th class="p-4 text-sm font-bold text-gray-600">Contato</th>
                                <th class="p-4 text-sm font-bold text-gray-600 text-center">Vencimento</th>
                                <th class="p-4 text-sm font-bold text-gray-600">Valor</th>
                                <th class="p-4 text-sm font-bold text-gray-600 text-center">Status</th>
                                <th class="p-4 text-sm font-bold text-gray-600">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="lista-financeiro" class="divide-y divide-gray-100">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- CONFIGURAÇÃO ---
        // Se já tiver o link do Apps Script, coloque aqui. Se não, ele usa o LocalStorage.
        let API_URL = ""; 
        let alunos = JSON.parse(localStorage.getItem('db_dojo')) || [];

        // Alternar entre abas
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
            document.getElementById('tab-' + tabName).classList.remove('hidden');
        }

        // Salvar Aluno
        document.getElementById('form-aluno').addEventListener('submit', function(e) {
            e.preventDefault();
            const novo = {
                id: Date.now(),
                nome: document.getElementById('nome').value,
                nascimento: document.getElementById('nascimento').value,
                whatsapp: document.getElementById('whatsapp').value,
                email: document.getElementById('email').value,
                faixa: document.getElementById('faixa').value,
                valor: document.getElementById('valor').value,
                vencimento: document.getElementById('vencimento').value,
                pago: false
            };

            alunos.push(novo);
            localStorage.setItem('db_dojo', JSON.stringify(alunos));
            alert("Matrícula realizada com sucesso!");
            this.reset();
            renderFinanceiro();
        });

        function renderFinanceiro() {
            const lista = document.getElementById('lista-financeiro');
            lista.innerHTML = '';
            
            alunos.forEach(aluno => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-4">
                        <div class="font-bold text-gray-800">${aluno.nome}</div>
                        <div class="text-xs text-gray-500 italic">${aluno.faixa}</div>
                    </td>
                    <td class="p-4 text-sm">
                        <a href="https://wa.me/55${aluno.whatsapp.replace(/\D/g,'')}" target="_blank" class="text-green-600 hover:underline"><i class="fab fa-whatsapp"></i> Zap</a>
                    </td>
                    <td class="p-4 text-center font-mono">Todo dia ${aluno.vencimento}</td>
                    <td class="p-4 font-semibold text-gray-700">R$ ${aluno.valor}</td>
                    <td class="p-4 text-center">
                        <span class="px-3 py-1 rounded-full text-xs font-bold ${aluno.pago ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                            ${aluno.pago ? 'PAGO' : 'PENDENTE'}
                        </span>
                    </td>
                    <td class="p-4 flex gap-2">
                        <button onclick="togglePago(${aluno.id})" class="bg-blue-50 text-blue-600 p-2 rounded hover:bg-blue-100"><i class="fas fa-dollar-sign"></i></button>
                        <button onclick="excluir(${aluno.id})" class="bg-red-50 text-red-600 p-2 rounded hover:bg-red-100"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                lista.appendChild(tr);
            });
        }

        function togglePago(id) {
            alunos = alunos.map(a => a.id === id ? {...a, pago: !a.pago} : a);
            localStorage.setItem('db_dojo', JSON.stringify(alunos));
            renderFinanceiro();
        }

        function excluir(id) {
            if(confirm("Excluir este aluno permanentemente?")) {
                alunos = alunos.filter(a => a.id !== id);
                localStorage.setItem('db_dojo', JSON.stringify(alunos));
                renderFinanceiro();
            }
        }

        // Início
        renderFinanceiro();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dojo System Pro v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800">

    <div class="min-h-screen flex flex-col md:flex-row">
        <aside class="w-full md:w-64 bg-slate-900 text-white p-6">
            <div class="flex items-center gap-3 mb-10">
                <div class="bg-yellow-500 p-2 rounded-lg text-slate-900">
                    <i class="fas fa-user-ninja text-xl"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">JUDÔ ADMIN</h1>
            </div>
            <nav class="space-y-2">
                <button onclick="switchTab('dashboard')" class="w-full flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 transition"><i class="fas fa-chart-line w-5"></i> Dashboard</button>
                <button onclick="switchTab('cadastro')" class="w-full flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 transition"><i class="fas fa-user-plus w-5"></i> Matrícula</button>
                <button onclick="switchTab('financeiro')" class="w-full flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 transition"><i class="fas fa-wallet w-5"></i> Financeiro</button>
            </nav>
        </aside>

        <main class="flex-1 p-4 md:p-10 overflow-y-auto">
            
            <section id="tab-dashboard" class="tab-content">
                <h2 class="text-3xl font-bold mb-6">Visão Geral</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <p class="text-slate-500 text-sm font-medium">Alunos Ativos</p>
                        <h3 id="stat-ativos" class="text-4xl font-bold text-blue-600">0</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <p class="text-slate-500 text-sm font-medium">Previsão de Receita</p>
                        <h3 id="stat-receita" class="text-4xl font-bold text-emerald-600">R$ 0</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <p class="text-slate-500 text-sm font-medium">Inadimplência</p>
                        <h3 id="stat-pendente" class="text-4xl font-bold text-rose-500">R$ 0</h3>
                    </div>
                </div>
            </section>

            <section id="tab-cadastro" class="tab-content hidden">
                <div class="max-w-3xl bg-white rounded-2xl shadow-md border border-slate-200 overflow-hidden">
                    <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                        <h2 id="form-title" class="text-xl font-bold">Nova Matrícula</h2>
                        <button onclick="cancelarEdicao()" id="btn-cancelar" class="hidden text-sm text-rose-500">Cancelar Edição</button>
                    </div>
                    <form id="form-aluno" class="p-8 grid grid-cols-1 md:grid-cols-2 gap-6">
                        <input type="hidden" id="aluno-id">
                        <div class="md:col-span-2">
                            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Nome do Atleta</label>
                            <input type="text" id="nome" class="w-full p-3 bg-slate-50 border rounded-xl focus:ring-2 focus:ring-blue-500 transition outline-none" placeholder="Nome Completo" required>
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Data Nascimento</label>
                            <input type="date" id="nascimento" class="w-full p-3 bg-slate-50 border rounded-xl" required>
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">WhatsApp</label>
                            <input type="tel" id="whatsapp" class="w-full p-3 bg-slate-50 border rounded-xl" placeholder="(00) 00000-0000">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Graduação</label>
                            <select id="faixa" class="w-full p-3 bg-slate-50 border rounded-xl">
                                <option>Branca</option><option>Azul</option><option>Amarela</option><option>Laranja</option><option>Verde</option><option>Roxa</option><option>Marrom</option><option>Preta</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Mensalidade (R$)</label>
                            <input type="number" id="valor" class="w-full p-3 bg-slate-50 border rounded-xl" value="100">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Dia de Vencimento</label>
                            <input type="number" id="vencimento" min="1" max="31" class="w-full p-3 bg-slate-50 border rounded-xl" value="10">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Status do Aluno</label>
                            <select id="status" class="w-full p-3 bg-slate-50 border rounded-xl font-bold">
                                <option value="Ativo" class="text-emerald-600">Ativo</option>
                                <option value="Inativo" class="text-rose-600">Inativo</option>
                            </select>
                        </div>
                        <div class="md:col-span-2 pt-4">
                            <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-slate-800 shadow-lg transition">SALVAR ALTERAÇÕES</button>
                        </div>
                    </form>
                </div>
            </section>

            <section id="tab-financeiro" class="tab-content hidden text-sm">
                <div class="bg-white rounded-2xl shadow-md border border-slate-200 overflow-hidden">
                    <div class="p-6 border-b flex flex-col md:flex-row justify-between gap-4 bg-white">
                        <h2 class="text-xl font-bold">Gestão de Pagamentos</h2>
                        <input type="text" onkeyup="filtrarTabela(this.value)" placeholder="Pesquisar atleta..." class="p-2 px-4 border rounded-full bg-slate-50 outline-none w-full md:w-64">
                    </div>
                    <div class="overflow-x-auto text-sm">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 border-b">
                                <tr>
                                    <th class="p-4 font-bold text-slate-500 uppercase tracking-widest text-[10px]">Atleta</th>
                                    <th class="p-4 font-bold text-slate-500 uppercase tracking-widest text-[10px]">Status</th>
                                    <th class="p-4 font-bold text-slate-500 uppercase tracking-widest text-[10px]">Venc.</th>
                                    <th class="p-4 font-bold text-slate-500 uppercase tracking-widest text-[10px]">Valor</th>
                                    <th class="p-4 font-bold text-slate-500 uppercase tracking-widest text-[10px]">Pagamento</th>
                                    <th class="p-4 font-bold text-slate-500 uppercase tracking-widest text-[10px]">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="lista-financeiro" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        let alunos = JSON.parse(localStorage.getItem('dojo_pro_data')) || [];

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
        }

        // SALVAR / EDITAR
        document.getElementById('form-aluno').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('aluno-id').value;
            
            const alunoData = {
                id: id ? parseInt(id) : Date.now(),
                nome: document.getElementById('nome').value,
                nascimento: document.getElementById('nascimento').value,
                whatsapp: document.getElementById('whatsapp').value,
                faixa: document.getElementById('faixa').value,
                valor: parseFloat(document.getElementById('valor').value),
                vencimento: document.getElementById('vencimento').value,
                status: document.getElementById('status').value,
                pago: id ? (alunos.find(a => a.id == id).pago) : false
            };

            if (id) {
                const index = alunos.findIndex(a => a.id == id);
                alunos[index] = alunoData;
            } else {
                alunos.push(alunoData);
            }

            salvarEDeslogar();
            cancelarEdicao();
            alert("Sucesso!");
            switchTab('financeiro');
        });

        function editarAluno(id) {
            const aluno = alunos.find(a => a.id == id);
            document.getElementById('aluno-id').value = aluno.id;
            document.getElementById('nome').value = aluno.nome;
            document.getElementById('nascimento').value = aluno.nascimento;
            document.getElementById('whatsapp').value = aluno.whatsapp;
            document.getElementById('faixa').value = aluno.faixa;
            document.getElementById('valor').value = aluno.valor;
            document.getElementById('vencimento').value = aluno.vencimento;
            document.getElementById('status').value = aluno.status || 'Ativo';
            
            document.getElementById('form-title').innerText = "Editando Atleta";
            document.getElementById('btn-cancelar').classList.remove('hidden');
            switchTab('cadastro');
        }

        function cancelarEdicao() {
            document.getElementById('form-aluno').reset();
            document.getElementById('aluno-id').value = "";
            document.getElementById('form-title').innerText = "Nova Matrícula";
            document.getElementById('btn-cancelar').classList.add('hidden');
        }

        function togglePagamento(id) {
            alunos = alunos.map(a => a.id === id ? {...a, pago: !a.pago} : a);
            salvarEDeslogar();
        }

        function salvarEDeslogar() {
            localStorage.setItem('dojo_pro_data', JSON.stringify(alunos));
            renderDashboard();
            renderFinanceiro();
        }

        function renderDashboard() {
            const ativos = alunos.filter(a => a.status !== 'Inativo');
            const totalReceita = ativos.reduce((acc, a) => acc + a.valor, 0);
            const pendente = ativos.filter(a => !a.pago).reduce((acc, a) => acc + a.valor, 0);

            document.getElementById('stat-ativos').innerText = ativos.length;
            document.getElementById('stat-receita').innerText = `R$ ${totalReceita.toFixed(2)}`;
            document.getElementById('stat-pendente').innerText = `R$ ${pendente.toFixed(2)}`;
        }

        function renderFinanceiro() {
            const lista = document.getElementById('lista-financeiro');
            lista.innerHTML = '';
            
            alunos.forEach(aluno => {
                const isAtivo = aluno.status !== 'Inativo';
                const tr = document.createElement('tr');
                tr.className = isAtivo ? "bg-white" : "bg-slate-50 opacity-60";
                tr.innerHTML = `
                    <td class="p-4 font-bold text-slate-700">${aluno.nome}<br><span class="text-[10px] text-slate-400 uppercase">${aluno.faixa}</span></td>
                    <td class="p-4">
                        <span class="px-2 py-1 rounded-md text-[10px] font-bold ${isAtivo ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}">${aluno.status || 'Ativo'}</span>
                    </td>
                    <td class="p-4 text-slate-500 font-mono">Dia ${aluno.vencimento}</td>
                    <td class="p-4 font-bold">R$ ${aluno.valor}</td>
                    <td class="p-4 text-center">
                        <button onclick="togglePagamento(${aluno.id})" class="px-4 py-2 rounded-lg font-bold text-[11px] transition ${aluno.pago ? 'bg-emerald-500 text-white shadow-emerald-200' : 'bg-slate-200 text-slate-600'}">
                            ${aluno.pago ? 'LIQUIDADO' : 'PENDENTE'}
                        </button>
                    </td>
                    <td class="p-4 space-x-2">
                        <button onclick="editarAluno(${aluno.id})" class="text-blue-500 p-2 hover:bg-blue-50 rounded-lg"><i class="fas fa-edit"></i></button>
                    </td>
                `;
                lista.appendChild(tr);
            });
        }

        function filtrarTabela(valor) {
            const linhas = document.querySelectorAll('#lista-financeiro tr');
            valor = valor.toLowerCase();
            linhas.forEach(linha => {
                linha.style.display = linha.innerText.toLowerCase().includes(valor) ? '' : 'none';
            });
        }

        // Inicialização
        renderDashboard();
        renderFinanceiro();
    </script>
</body>
</html>

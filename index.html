<div class="overflow-x-auto">
    <table class="w-full text-left border-separate border-spacing-y-2">
        <thead class="bg-slate-50">
            <tr>
                <th class="p-4 font-bold text-slate-500 uppercase text-[10px] w-64">Atleta</th>
                <th class="p-4 font-bold text-slate-500 uppercase text-[10px] text-center">Status Jan-Dez</th>
                <th class="p-4 font-bold text-slate-500 uppercase text-[10px] text-right">Ações</th>
            </tr>
        </thead>
        <tbody id="lista-financeiro"></tbody>
    </table>
</div>

<script>
    let alunos = JSON.parse(localStorage.getItem('dojo_pro_v3')) || [];
    const mesesNome = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
    const mesAtualIndex = new Date().getMonth();

    function salvar() {
        localStorage.setItem('dojo_pro_v3', JSON.stringify(alunos));
        renderDashboard();
        renderFinanceiro();
    }

    function renderFinanceiro() {
        const lista = document.getElementById('lista-financeiro');
        lista.innerHTML = '';

        alunos.forEach(aluno => {
            if (!aluno.pagamentos) aluno.pagamentos = Array(12).fill(false); // Inicializa 12 meses

            const tr = document.createElement('tr');
            tr.className = "bg-white shadow-sm rounded-xl overflow-hidden";
            
            // Gerar HTML dos meses
            let mesesHtml = '<div class="flex gap-1 justify-center">';
            aluno.pagamentos.forEach((pago, index) => {
                let statusClass = "";
                let title = mesesNome[index];

                if (pago) {
                    statusClass = "bg-emerald-500 text-white"; // Pago
                } else if (index < mesAtualIndex) {
                    statusClass = "bg-rose-100 text-rose-600 border border-rose-200"; // Atrasado
                } else if (index === mesAtualIndex) {
                    statusClass = "bg-amber-100 text-amber-700 border border-amber-300 animate-pulse"; // Mês Atual
                } else {
                    statusClass = "bg-slate-50 text-slate-300 border border-slate-100"; // Futuro
                }

                mesesHtml += `
                    <button onclick="toggleMes(${aluno.id}, ${index})" 
                        title="${title}"
                        class="w-8 h-8 rounded-md text-[10px] font-bold transition-all hover:scale-110 ${statusClass}">
                        ${mesesNome[index]}
                    </button>`;
            });
            mesesHtml += '</div>';

            tr.innerHTML = `
                <td class="p-4 border-l-4 ${aluno.status === 'Ativo' ? 'border-emerald-500' : 'border-slate-300'}">
                    <div class="font-bold text-slate-700">${aluno.nome}</div>
                    <div class="flex gap-2 text-[10px] font-medium uppercase text-slate-400">
                        <span>${aluno.faixa}</span> • <span>Venc. Dia ${aluno.vencimento}</span> • <span>R$ ${aluno.valor}</span>
                    </div>
                </td>
                <td class="p-4">${mesesHtml}</td>
                <td class="p-4 text-right">
                    <button onclick="editarAluno(${aluno.id})" class="text-blue-500 p-2 hover:bg-blue-50 rounded-lg"><i class="fas fa-edit"></i></button>
                    <a href="https://wa.me/55${aluno.whatsapp?.replace(/\D/g,'')}" target="_blank" class="text-green-500 p-2 hover:bg-green-50 rounded-lg"><i class="fab fa-whatsapp"></i></a>
                </td>
            `;
            lista.appendChild(tr);
        });
    }

    function toggleMes(alunoId, mesIndex) {
        const index = alunos.findIndex(a => a.id === alunoId);
        if (index !== -1) {
            if (!alunos[index].pagamentos) alunos[index].pagamentos = Array(12).fill(false);
            alunos[index].pagamentos[mesIndex] = !alunos[index].pagamentos[mesIndex];
            salvar();
        }
    }

    // Atualize a função de salvar aluno para incluir o array de pagamentos
    document.getElementById('form-aluno').addEventListener('submit', function(e) {
        e.preventDefault();
        const id = document.getElementById('aluno-id').value;
        const indexExistente = alunos.findIndex(a => a.id == id);
        
        const alunoData = {
            id: id ? parseInt(id) : Date.now(),
            nome: document.getElementById('nome').value,
            nascimento: document.getElementById('nascimento').value,
            whatsapp: document.getElementById('whatsapp').value,
            faixa: document.getElementById('faixa').value,
            valor: parseFloat(document.getElementById('valor').value),
            vencimento: document.getElementById('vencimento').value,
            status: document.getElementById('status').value,
            pagamentos: id ? alunos[indexExistente].pagamentos : Array(12).fill(false)
        };

        if (id) {
            alunos[indexExistente] = alunoData;
        } else {
            alunos.push(alunoData);
        }

        salvar();
        cancelarEdicao();
        switchTab('financeiro');
    });

    function renderDashboard() {
        const ativos = alunos.filter(a => a.status === 'Ativo');
        const totalReceitaAnual = ativos.reduce((acc, a) => acc + (a.valor * 12), 0);
        
        // Cálculo de quanto já foi pago no mês atual
        const recebidoMes = ativos.reduce((acc, a) => {
            return acc + (a.pagamentos[mesAtualIndex] ? a.valor : 0);
        }, 0);

        // Cálculo de inadimplência (meses passados não pagos)
        const inadimplencia = ativos.reduce((acc, a) => {
            const mesesPassados = a.pagamentos.slice(0, mesAtualIndex);
            const naoPagos = mesesPassados.filter(p => !p).length;
            return acc + (naoPagos * a.valor);
        }, 0);

        document.getElementById('stat-ativos').innerText = ativos.length;
        document.getElementById('stat-receita').innerText = `R$ ${recebidoMes.toFixed(2)}`;
        document.getElementById('stat-pendente').innerText = `R$ ${inadimplencia.toFixed(2)}`;
    }

    // Inicialização
    renderDashboard();
    renderFinanceiro();
</script>

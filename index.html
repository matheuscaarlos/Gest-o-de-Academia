<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dojo Manager Pro - Sincronização Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { brand: { 50: '#ecfdf5', 100: '#d1fae5', 500: '#10b981', 600: '#059669', 700: '#047857', 900: '#064e3b' } }
                }
            }
        }
    </script>
    <style>
        .month-disabled { background-color: #f4f4f5 !important; color: #d4d4d8 !important; cursor: not-allowed !important; border: 1px dashed #e4e4e7; }
        .modal-active { display: flex !important; animation: fadeInModal 0.2s ease-out forwards; }
        .tab-content { animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInModal { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        #sync-loader { transition: all 0.3s; opacity: 0; pointer-events: none; }
        #sync-loader.active { opacity: 1; pointer-events: auto; }
        .loading-overlay { position: fixed; inset: 0; background: white; z-index: 100; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
    </style>
</head>
<body class="bg-white text-zinc-800 antialiased selection:bg-brand-500">

    <div id="initial-load" class="loading-overlay">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-brand-100 border-t-brand-600 rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-zinc-500 font-bold animate-pulse text-sm">CONECTANDO AO BANCO DE DADOS...</p>
        </div>
    </div>

    <div id="sync-loader" class="fixed bottom-6 right-6 z-50 bg-zinc-900 text-white px-6 py-3 rounded-2xl text-xs font-bold shadow-2xl flex items-center gap-3">
        <i class="fas fa-cloud-upload-alt text-brand-500 animate-bounce"></i>
        ATUALIZANDO NUVEM...
    </div>

    <div class="min-h-screen flex flex-col md:flex-row">
        <aside class="w-full md:w-72 bg-brand-900 text-white shadow-2xl z-40 md:min-h-screen sticky top-0 flex flex-col">
            <div class="p-8 flex items-center justify-between border-b border-white/10">
                <div class="flex items-center gap-4">
                    <div class="bg-white p-3 rounded-2xl text-brand-700 shadow-lg"><i class="fas fa-user-ninja text-xl"></i></div>
                    <h1 class="text-2xl font-black text-white">DOJO<span class="text-brand-500">PRO</span></h1>
                </div>
            </div>
            <nav class="flex overflow-x-auto md:flex-col gap-2 p-6 no-scrollbar">
                <button onclick="switchTab('dashboard')" class="flex-shrink-0 flex items-center gap-3 px-4 py-3.5 rounded-xl hover:bg-brand-800 text-brand-100 font-semibold text-sm w-full"><i class="fas fa-chart-pie w-5"></i> Dashboard</button>
                <button onclick="switchTab('cadastro')" class="flex-shrink-0 flex items-center gap-3 px-4 py-3.5 rounded-xl hover:bg-brand-800 text-brand-100 font-semibold text-sm w-full"><i class="fas fa-user-plus w-5"></i> Matrícula</button>
                <button onclick="switchTab('financeiro')" class="flex-shrink-0 flex items-center gap-3 px-4 py-3.5 rounded-xl hover:bg-brand-800 text-brand-100 font-semibold text-sm w-full"><i class="fas fa-wallet w-5"></i> Financeiro</button>
                <button onclick="carregarDadosNuvem()" class="mt-4 flex-shrink-0 flex items-center gap-3 px-4 py-3.5 rounded-xl bg-brand-800 text-white font-bold text-xs w-full"><i class="fas fa-sync-alt"></i> ATUALIZAR AGORA</button>
            </nav>
        </aside>

        <main class="flex-1 p-4 md:p-10 w-full max-w-7xl mx-auto">
            <section id="tab-dashboard" class="tab-content">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                    <div class="bg-white p-6 rounded-[2rem] border border-zinc-200"><p class="text-zinc-400 text-xs font-bold uppercase mb-2">Receita (Mês)</p><h3 id="stat-receita" class="text-4xl font-extrabold text-zinc-900">R$ 0</h3></div>
                    <div class="bg-white p-6 rounded-[2rem] border border-zinc-200"><p class="text-zinc-400 text-xs font-bold uppercase mb-2">Pendência</p><h3 id="stat-pendente" class="text-4xl font-extrabold text-zinc-900 text-rose-600">R$ 0</h3></div>
                    <div class="bg-white p-6 rounded-[2rem] border border-zinc-200"><p class="text-zinc-400 text-xs font-bold uppercase mb-2">Atletas Ativos</p><h3 id="stat-ativos" class="text-4xl font-extrabold text-zinc-900">0</h3></div>
                </div>
                <div class="bg-white rounded-[2rem] border border-zinc-200 overflow-hidden">
                    <table class="w-full text-left"><tbody id="lista-atletas-dash" class="divide-y divide-zinc-100"></tbody></table>
                </div>
            </section>

            <section id="tab-cadastro" class="tab-content hidden">
                <div class="max-w-4xl mx-auto bg-white rounded-[2rem] border border-zinc-200 p-8">
                    <h2 id="form-title" class="text-2xl font-black mb-6">Ficha de Matrícula</h2>
                    <form id="form-aluno" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <input type="hidden" id="aluno-id"><input type="hidden" id="matricula_id">
                        <div class="md:col-span-2"><label class="text-xs font-bold">Nome Completo</label><input type="text" id="nome" class="w-full p-4 bg-zinc-50 border rounded-2xl" required></div>
                        <div><label class="text-xs font-bold">Início Matrícula</label><input type="date" id="data_matricula" class="w-full p-4 bg-zinc-50 border rounded-2xl" required></div>
                        <div><label class="text-xs font-bold text-brand-600">Valor Mensal R$</label><input type="number" id="valor" class="w-full p-4 bg-brand-50 border border-brand-100 rounded-2xl font-black text-lg" value="100"></div>
                        <div class="md:col-span-2"><button type="submit" class="w-full bg-brand-600 text-white py-5 rounded-2xl font-black text-lg shadow-lg shadow-brand-100 hover:bg-brand-700 transition-all">SALVAR ALTERAÇÕES PARA TODOS</button></div>
                    </form>
                </div>
            </section>

            <section id="tab-financeiro" class="tab-content hidden">
                <div class="bg-white rounded-[2rem] border border-zinc-200 overflow-hidden">
                    <div class="overflow-x-auto p-4"><table class="w-full text-left border-separate border-spacing-y-2"><tbody id="lista-financeiro"></tbody></table></div>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-pagamento" class="fixed inset-0 bg-zinc-950/40 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full shadow-2xl border border-zinc-100">
            <h3 class="text-xl font-bold mb-1 text-zinc-900 tracking-tight text-center">Registrar Valor</h3>
            <p id="modal-aluno-nome" class="text-brand-600 font-semibold mb-6 text-xs uppercase text-center"></p>
            <input type="number" id="valor-parcial" class="w-full p-5 bg-zinc-50 border border-zinc-200 rounded-2xl outline-none font-black text-brand-700 text-2xl text-center mb-4">
            <div class="grid grid-cols-2 gap-2">
                <button onclick="confirmarPagamentoParcial('Pix')" class="p-4 border border-zinc-100 rounded-2xl hover:bg-brand-50 transition-all font-bold text-xs">PIX</button>
                <button onclick="confirmarPagamentoParcial('Espécie')" class="p-4 border border-zinc-100 rounded-2xl hover:bg-brand-50 transition-all font-bold text-xs">DINHEIRO</button>
                <button onclick="confirmarPagamentoParcial('Cartão')" class="p-4 border border-zinc-100 rounded-2xl hover:bg-brand-50 transition-all font-bold text-xs">CARTÃO</button>
                <button onclick="fecharModal()" class="p-4 bg-zinc-100 rounded-2xl font-bold text-xs text-zinc-500">FECHAR</button>
            </div>
            <button onclick="estornarMes()" class="w-full mt-4 text-[10px] text-rose-400 font-bold uppercase">Zerar Mês</button>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURAÇÃO: COLE O SEU LINK ABAIXO
        // ==========================================
        const SCRIPT_URL = "https://script.google.com/macros/library/d/1ht0z0C28E14Ud7D-D4NbEgiilHRG8YvpVj_5Ffwxe4K-q_CAo84BJB37/2"; 

        let alunos = [];
        const mesesNome = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
        const mesAtualIndex = new Date().getMonth();
        let alunoSendoPago = null, mesSendoPago = null;

        function showLoader(show) { document.getElementById('sync-loader').classList.toggle('active', show); }

        // SINCRONIZAÇÃO COMPLETA
        async function salvar() {
            if (SCRIPT_URL.includes("COLE_AQUI")) return alert("Por favor, configure o link do Google Sheets no código.");
            
            showLoader(true);
            try {
                // Salva na nuvem (método POST envia tudo para a planilha)
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(alunos)
                });
                // Recarrega os dados da nuvem para garantir que todos vejam o mesmo
                setTimeout(carregarDadosNuvem, 1500); 
            } catch (e) {
                alert("Erro ao salvar na nuvem. Verifique sua conexão.");
            }
        }

        async function carregarDadosNuvem() {
            if (SCRIPT_URL.includes("COLE_AQUI")) return;
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                alunos = data || [];
                renderDashboard(); renderFinanceiro();
                document.getElementById('initial-load').style.opacity = '0';
                setTimeout(() => document.getElementById('initial-load').style.display = 'none', 500);
                showLoader(false);
            } catch (e) {
                console.error("Erro ao sincronizar", e);
            }
        }

        // INTERFACE E LÓGICA
        function renderDashboard() {
            const ativos = alunos.filter(a => a.status === 'Ativo');
            const recMes = ativos.reduce((acc, a) => acc + (a.pagamentos[mesAtualIndex]?.totalPago || 0), 0);
            
            document.getElementById('stat-ativos').innerText = ativos.length;
            document.getElementById('stat-receita').innerText = `R$ ${recMes.toFixed(2)}`;
            
            const listaDash = document.getElementById('lista-atletas-dash');
            listaDash.innerHTML = '';
            alunos.forEach(aluno => {
                listaDash.innerHTML += `<tr class="group"><td class="p-6 font-black text-zinc-800">${aluno.nome}</td><td class="p-6 text-right"><button onclick="editarAluno(${aluno.id})" class="text-zinc-300 hover:text-brand-600"><i class="fas fa-edit"></i></button></td></tr>`;
            });
        }

        function renderFinanceiro() {
            const lista = document.getElementById('lista-financeiro');
            lista.innerHTML = '';
            alunos.forEach(aluno => {
                const mesMatricula = new Date(aluno.data_matricula + "T00:00:00").getMonth();
                let mesesHtml = '<div class="flex gap-1 justify-center">';
                aluno.pagamentos.forEach((p, i) => {
                    let d = i < mesMatricula;
                    let estagio = p.pago ? "bg-brand-600 text-white" : (p.totalPago > 0 ? "bg-amber-400 text-white" : (i < mesAtualIndex ? "bg-rose-50 text-rose-500" : "bg-zinc-50 text-zinc-400"));
                    mesesHtml += `<button onclick="${d ? '' : `abrirPagamento(${aluno.id}, ${i})`}" class="w-10 h-10 rounded-xl text-[10px] font-black ${d ? 'month-disabled' : estagio}">${p.pago ? '✓' : mesesNome[i]}</button>`;
                });
                lista.innerHTML += `<tr class="bg-white"><td class="p-4"><div class="font-black text-sm">${aluno.nome}</div><div class="text-[10px] text-zinc-400">R$ ${aluno.valor}</div></td><td class="p-4">${mesesHtml}</td></tr>`;
            });
        }

        function abrirPagamento(id, i) {
            const a = alunos.find(x => x.id === id);
            alunoSendoPago = id; mesSendoPago = i;
            const p = a.pagamentos[i];
            document.getElementById('modal-aluno-nome').innerText = a.nome + " • " + mesesNome[i];
            document.getElementById('valor-parcial').value = (a.valor - p.totalPago).toFixed(2);
            document.getElementById('modal-pagamento').classList.add('modal-active');
        }

        function confirmarPagamentoParcial(metodo) {
            const valor = parseFloat(document.getElementById('valor-parcial').value);
            const a = alunos.find(x => x.id === alunoSendoPago);
            const p = a.pagamentos[mesSendoPago];
            p.totalPago += valor;
            if (p.totalPago >= a.valor) p.pago = true;
            fecharModal(); salvar();
        }

        function estornarMes() {
            if(confirm("Zerar pagamentos?")) {
                const a = alunos.find(x => x.id === alunoSendoPago);
                a.pagamentos[mesSendoPago] = {pago: false, totalPago: 0, historico: []};
                fecharModal(); salvar();
            }
        }

        document.getElementById('form-aluno').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('aluno-id').value;
            const novoAluno = {
                id: id ? parseInt(id) : Date.now(),
                nome: document.getElementById('nome').value,
                data_matricula: document.getElementById('data_matricula').value,
                valor: parseFloat(document.getElementById('valor').value),
                status: 'Ativo',
                pagamentos: id ? alunos.find(a => a.id == id).pagamentos : Array(12).fill().map(() => ({pago: false, totalPago: 0}))
            };
            if (id) alunos[alunos.findIndex(a => a.id == id)] = novoAluno;
            else alunos.push(novoAluno);
            salvar(); switchTab('dashboard');
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
        }

        function fecharModal() { document.getElementById('modal-pagamento').classList.remove('modal-active'); }
        
        function editarAluno(id) { 
            const a = alunos.find(x => x.id == id);
            document.getElementById('aluno-id').value = a.id;
            document.getElementById('nome').value = a.nome;
            document.getElementById('data_matricula').value = a.data_matricula;
            document.getElementById('valor').value = a.valor;
            switchTab('cadastro');
        }

        // Inicializa puxando da nuvem
        carregarDadosNuvem();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dojo Manager Pro - Cloud Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { brand: { 50: '#ecfdf5', 100: '#d1fae5', 500: '#10b981', 600: '#059669', 700: '#047857', 900: '#064e3b' } }
                }
            }
        }
    </script>
    <style>
        .month-disabled { background-color: #f4f4f5 !important; color: #d4d4d8 !important; cursor: not-allowed !important; border: 1px dashed #e4e4e7; }
        .modal-active { display: flex !important; animation: fadeInModal 0.2s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tab-content { animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInModal { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        #sync-loader { transition: all 0.3s; opacity: 0; pointer-events: none; }
        #sync-loader.active { opacity: 1; }
    </style>
</head>
<body class="bg-white text-zinc-800 antialiased selection:bg-brand-500 selection:text-white">

    <div id="sync-loader" class="fixed bottom-6 right-6 z-50 bg-zinc-900 text-white px-4 py-2 rounded-full text-xs font-bold shadow-2xl flex items-center gap-3">
        <i class="fas fa-circle-notch fa-spin text-brand-500"></i>
        Sincronizando com Google Sheets...
    </div>

    <div id="modal-pagamento" class="fixed inset-0 bg-zinc-950/40 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full shadow-2xl border border-zinc-100">
            <h3 class="text-xl font-bold mb-1 text-zinc-900 tracking-tight">Registrar Pagamento</h3>
            <p id="modal-aluno-nome" class="text-brand-600 font-semibold mb-2 text-xs uppercase"></p>
            
            <div class="bg-zinc-50 p-4 rounded-2xl mb-6 border border-zinc-100">
                <div class="flex justify-between text-xs mb-1">
                    <span class="text-zinc-500 font-bold">Total Devido:</span>
                    <span id="pago-total-devido" class="font-black text-zinc-900 text-sm">R$ 0,00</span>
                </div>
                <div class="flex justify-between text-xs">
                    <span class="text-brand-600 font-bold">Restante:</span>
                    <span id="pago-restante" class="font-black text-brand-600 text-sm">R$ 0,00</span>
                </div>
            </div>

            <div class="space-y-3">
                <input type="number" id="valor-parcial" class="w-full p-4 bg-zinc-50 border border-zinc-200 rounded-2xl outline-none font-black text-brand-700 text-lg" placeholder="0,00">
                <div class="grid grid-cols-2 gap-2 mt-4">
                    <button onclick="confirmarPagamentoParcial('Pix')" class="p-3 border border-zinc-200 rounded-xl hover:bg-brand-50 transition-all flex items-center gap-2"><i class="fas fa-qrcode text-brand-600"></i> <span class="text-[10px] font-black">PIX</span></button>
                    <button onclick="confirmarPagamentoParcial('Espécie')" class="p-3 border border-zinc-200 rounded-xl hover:bg-brand-50 transition-all flex items-center gap-2"><i class="fas fa-money-bill-wave text-brand-600"></i> <span class="text-[10px] font-black">DINHEIRO</span></button>
                    <button onclick="confirmarPagamentoParcial('Cartão')" class="p-3 border border-zinc-200 rounded-xl hover:bg-brand-50 transition-all flex items-center gap-2"><i class="fas fa-credit-card text-brand-600"></i> <span class="text-[10px] font-black">CARTÃO</span></button>
                    <button onclick="confirmarPagamentoParcial('Boleto')" class="p-3 border border-zinc-200 rounded-xl hover:bg-brand-50 transition-all flex items-center gap-2"><i class="fas fa-barcode text-brand-600"></i> <span class="text-[10px] font-black">BOLETO</span></button>
                </div>
            </div>

            <div class="flex gap-2 mt-6">
                <button onclick="estornarMes()" class="flex-1 py-3 bg-rose-50 text-rose-600 font-bold rounded-xl text-xs uppercase">Zerar Mês</button>
                <button onclick="fecharModal()" class="flex-1 py-3 bg-zinc-100 text-zinc-500 font-bold rounded-xl text-xs uppercase">Fechar</button>
            </div>
        </div>
    </div>

    <div class="min-h-screen flex flex-col md:flex-row">
        <aside class="w-full md:w-72 bg-brand-900 text-white shadow-2xl z-40 md:min-h-screen sticky top-0 flex flex-col">
            <div class="p-8 flex items-center justify-between border-b border-white/10">
                <div class="flex items-center gap-4">
                    <div class="bg-white p-3 rounded-2xl shadow-lg text-brand-700"><i class="fas fa-user-ninja text-xl"></i></div>
                    <div>
                        <h1 class="text-2xl font-extrabold tracking-tight text-white">DOJO<span class="text-brand-500">PRO</span></h1>
                    </div>
                </div>
            </div>
            <nav class="flex overflow-x-auto md:flex-col gap-2 p-6 no-scrollbar">
                <button onclick="switchTab('dashboard')" class="flex-shrink-0 flex items-center gap-3 px-4 py-3.5 rounded-xl hover:bg-brand-800 text-brand-100 font-semibold text-sm w-full"><i class="fas fa-chart-pie w-5"></i> Dashboard</button>
                <button onclick="switchTab('cadastro')" class="flex-shrink-0 flex items-center gap-3 px-4 py-3.5 rounded-xl hover:bg-brand-800 text-brand-100 font-semibold text-sm w-full"><i class="fas fa-user-plus w-5"></i> Matrícula</button>
                <button onclick="switchTab('financeiro')" class="flex-shrink-0 flex items-center gap-3 px-4 py-3.5 rounded-xl hover:bg-brand-800 text-brand-100 font-semibold text-sm w-full"><i class="fas fa-wallet w-5"></i> Financeiro</button>
                <button onclick="switchTab('relatorios')" class="flex-shrink-0 flex items-center gap-3 px-4 py-3.5 rounded-xl hover:bg-brand-800 text-brand-100 font-semibold text-sm w-full"><i class="fas fa-clipboard-list w-5"></i> Relatórios</button>
            </nav>
        </aside>

        <main class="flex-1 p-4 md:p-10 w-full max-w-7xl mx-auto">
            <section id="tab-dashboard" class="tab-content">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                    <div class="bg-white p-6 rounded-[2rem] border border-zinc-200"><p class="text-zinc-400 text-xs font-bold uppercase mb-2">Receita (Mês)</p><h3 id="stat-receita" class="text-4xl font-extrabold text-zinc-900">R$ 0</h3></div>
                    <div class="bg-white p-6 rounded-[2rem] border border-zinc-200"><p class="text-zinc-400 text-xs font-bold uppercase mb-2">Pendência</p><h3 id="stat-pendente" class="text-4xl font-extrabold text-zinc-900">R$ 0</h3></div>
                    <div class="bg-white p-6 rounded-[2rem] border border-zinc-200"><p class="text-zinc-400 text-xs font-bold uppercase mb-2">Atletas Ativos</p><h3 id="stat-ativos" class="text-4xl font-extrabold text-zinc-900">0</h3></div>
                </div>
                <div class="bg-white rounded-[2rem] border border-zinc-200 overflow-hidden">
                    <div class="p-6 border-b border-zinc-100 flex justify-between items-center"><h3 class="font-bold text-zinc-900">Atletas Cadastrados</h3><input type="text" onkeyup="filtrarTabela(this.value, 'lista-atletas-dash')" placeholder="Buscar..." class="p-2 px-4 border rounded-xl text-xs outline-none"></div>
                    <table class="w-full text-left"><tbody id="lista-atletas-dash" class="divide-y divide-zinc-100"></tbody></table>
                </div>
            </section>

            <section id="tab-cadastro" class="tab-content hidden">
                <div class="max-w-4xl mx-auto bg-white rounded-[2rem] border border-zinc-200 p-8">
                    <h2 id="form-title" class="text-2xl font-black mb-6">Ficha de Matrícula</h2>
                    <form id="form-aluno" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <input type="hidden" id="aluno-id"><input type="hidden" id="matricula_id">
                        <div class="md:col-span-2"><label class="text-xs font-bold">Nome Completo</label><input type="text" id="nome" class="w-full p-3 bg-zinc-50 border rounded-xl" required></div>
                        <div><label class="text-xs font-bold">Data Início</label><input type="date" id="data_matricula" class="w-full p-3 bg-zinc-50 border rounded-xl" required></div>
                        <div><label class="text-xs font-bold">WhatsApp</label><input type="tel" id="whatsapp" class="w-full p-3 bg-zinc-50 border rounded-xl" placeholder="(00) 00000-0000"></div>
                        <div><label class="text-xs font-bold">Faixa</label><select id="faixa" class="w-full p-3 bg-zinc-50 border rounded-xl"><option>Branca</option><option>Cinza</option><option>Azul</option><option>Amarela</option><option>Laranja</option><option>Verde</option><option>Roxa</option><option>Marrom</option><option>Preta</option></select></div>
                        <div><label class="text-xs font-bold text-brand-600">Valor Mensal R$</label><input type="number" id="valor" class="w-full p-3 bg-brand-50 border border-brand-100 rounded-xl font-bold" value="100"></div>
                        <div class="md:col-span-2 flex gap-4">
                            <button type="submit" class="flex-1 bg-brand-600 text-white py-4 rounded-xl font-bold">SALVAR NO GOOGLE SHEETS</button>
                            <button type="button" onclick="cancelarEdicao()" id="btn-cancelar" class="hidden px-6 bg-zinc-100 rounded-xl font-bold">CANCELAR</button>
                        </div>
                    </form>
                </div>
            </section>

            <section id="tab-financeiro" class="tab-content hidden">
                <div class="bg-white rounded-[2rem] border border-zinc-200 overflow-hidden">
                    <div class="p-8 border-b border-zinc-100 flex justify-between items-center"><h2 class="text-2xl font-black">Financeiro</h2><input type="text" onkeyup="filtrarTabela(this.value, 'lista-financeiro')" placeholder="Buscar..." class="p-3 border rounded-xl text-sm outline-none"></div>
                    <div class="overflow-x-auto p-4"><table class="w-full text-left border-separate border-spacing-y-2"><tbody id="lista-financeiro"></tbody></table></div>
                </div>
            </section>

            <section id="tab-relatorios" class="tab-content hidden">
                <div id="lista-ativos" class="bg-white rounded-[2rem] border border-brand-100 overflow-hidden p-4"></div>
            </section>
        </main>
    </div>

    <script>
        // ==========================================
        // CONFIGURAÇÃO GOOGLE SHEETS
        // ==========================================
        const URL_APLICATIVO_GOOGLE = "COLE_AQUI_SEU_LINK_DO_GOOGLE"; 
        
        let alunos = JSON.parse(localStorage.getItem('dojo_v7_cloud_db')) || [];
        const mesesNome = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
        const mesAtualIndex = new Date().getMonth();
        let alunoSendoPago = null;
        let mesSendoPago = null;

        function showLoader(show) {
            document.getElementById('sync-loader').classList.toggle('active', show);
        }

        async function salvar() {
            // Salva Localmente primeiro
            localStorage.setItem('dojo_v7_cloud_db', JSON.stringify(alunos));
            renderDashboard(); renderFinanceiro(); renderRelatorios();

            // Sincroniza com Google Sheets em segundo plano
            if (URL_APLICATIVO_GOOGLE !== "COLE_AQUI_SEU_LINK_DO_GOOGLE") {
                showLoader(true);
                try {
                    await fetch(URL_APLICATIVO_GOOGLE, {
                        method: 'POST',
                        mode: 'no-cors', // Necessário para Google Scripts
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(alunos)
                    });
                } catch (e) { console.error("Erro na nuvem:", e); }
                setTimeout(() => showLoader(false), 1000);
            }
        }

        async function carregarDadosNuvem() {
            if (URL_APLICATIVO_GOOGLE === "COLE_AQUI_SEU_LINK_DO_GOOGLE") return;
            showLoader(true);
            try {
                const response = await fetch(URL_APLICATIVO_GOOGLE);
                const cloudData = await response.json();
                if (cloudData && cloudData.length > 0) {
                    alunos = cloudData;
                    localStorage.setItem('dojo_v7_cloud_db', JSON.stringify(alunos));
                    renderDashboard(); renderFinanceiro(); renderRelatorios();
                }
            } catch (e) { console.error("Erro ao carregar:", e); }
            showLoader(false);
        }

        // Funções de Interface permanecem iguais
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
        }

        document.getElementById('form-aluno').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('aluno-id').value;
            const matricula_existente = document.getElementById('matricula_id').value;
            
            const novoAluno = {
                id: id ? parseInt(id) : Date.now(),
                matricula_id: id ? matricula_existente : 'DJ'+Math.floor(1000+Math.random()*9000),
                nome: document.getElementById('nome').value,
                data_matricula: document.getElementById('data_matricula').value,
                whatsapp: document.getElementById('whatsapp').value,
                faixa: document.getElementById('faixa').value,
                valor: parseFloat(document.getElementById('valor').value),
                status: 'Ativo',
                pagamentos: id ? alunos.find(a => a.id == id).pagamentos : Array(12).fill().map(() => ({pago: false, totalPago: 0, historico: []}))
            };

            if (id) alunos[alunos.findIndex(a => a.id == id)] = novoAluno;
            else alunos.push(novoAluno);

            salvar(); cancelarEdicao(); switchTab('dashboard');
        });

        function abrirPagamento(id, i) {
            const a = alunos.find(x => x.id === id);
            alunoSendoPago = id; mesSendoPago = i;
            const p = a.pagamentos[i];
            document.getElementById('modal-aluno-nome').innerText = a.nome + " • " + mesesNome[i];
            document.getElementById('pago-total-devido').innerText = `R$ ${a.valor.toFixed(2)}`;
            document.getElementById('pago-restante').innerText = `R$ ${(a.valor - p.totalPago).toFixed(2)}`;
            document.getElementById('valor-parcial').value = (a.valor - p.totalPago).toFixed(2);
            document.getElementById('modal-pagamento').classList.add('modal-active');
        }

        function confirmarPagamentoParcial(metodo) {
            const valor = parseFloat(document.getElementById('valor-parcial').value);
            const a = alunos.find(x => x.id === alunoSendoPago);
            const p = a.pagamentos[mesSendoPago];
            p.totalPago += valor;
            p.historico.push({ valor, metodo, data: new Date().toLocaleDateString() });
            if (p.totalPago >= a.valor) p.pago = true;
            fecharModal(); salvar();
        }

        function estornarMes() {
            if(confirm("Zerar pagamentos do mês?")) {
                const a = alunos.find(x => x.id === alunoSendoPago);
                a.pagamentos[mesSendoPago] = {pago: false, totalPago: 0, historico: []};
                fecharModal(); salvar();
            }
        }

        function renderFinanceiro() {
            const lista = document.getElementById('lista-financeiro');
            lista.innerHTML = '';
            alunos.forEach(aluno => {
                const mesMatricula = new Date(aluno.data_matricula + "T00:00:00").getMonth();
                let mesesHtml = '<div class="flex gap-1 justify-center">';
                aluno.pagamentos.forEach((p, i) => {
                    let d = i < mesMatricula;
                    let estagio = p.pago ? "bg-brand-600 text-white" : (p.totalPago > 0 ? "bg-amber-400 text-white" : (i < mesAtualIndex ? "bg-rose-50 text-rose-500" : "bg-zinc-50 text-zinc-400"));
                    mesesHtml += `<button onclick="${d ? '' : `abrirPagamento(${aluno.id}, ${i})`}" class="w-9 h-9 rounded-lg text-[10px] font-bold ${d ? 'month-disabled' : estagio}">${p.pago ? '✓' : mesesNome[i]}</button>`;
                });
                lista.innerHTML += `<tr class="bg-white"><td class="p-3 font-bold text-sm">${aluno.nome}<br><span class="text-[10px] text-zinc-400 font-normal">R$ ${aluno.valor}</span></td><td class="p-3">${mesesHtml}</td></tr>`;
            });
        }

        function renderDashboard() {
            const ativos = alunos.filter(a => a.status === 'Ativo');
            document.getElementById('stat-ativos').innerText = ativos.length;
            const listaDash = document.getElementById('lista-atletas-dash');
            listaDash.innerHTML = '';
            alunos.forEach(aluno => {
                listaDash.innerHTML += `<tr><td class="p-4 font-bold text-sm">${aluno.nome}</td><td class="p-4 text-right"><button onclick="editarAluno(${aluno.id})" class="text-zinc-400 p-2"><i class="fas fa-pen"></i></button></td></tr>`;
            });
        }

        function renderRelatorios() {
            const lA = document.getElementById('lista-ativos');
            lA.innerHTML = '<h4 class="font-black text-xs uppercase mb-4">Lista de Chamada / WhatsApp</h4>';
            alunos.forEach(a => {
                lA.innerHTML += `<div class="flex justify-between p-2 text-sm border-b"><span>${a.nome}</span><a href="https://wa.me/55${a.whatsapp?.replace(/\D/g,'')}" class="text-brand-600"><i class="fab fa-whatsapp"></i></a></div>`;
            });
        }

        function fecharModal() { document.getElementById('modal-pagamento').classList.remove('modal-active'); }
        function cancelarEdicao() { document.getElementById('form-aluno').reset(); document.getElementById('aluno-id').value = ""; document.getElementById('btn-cancelar').classList.add('hidden'); }
        function editarAluno(id) { 
            const a = alunos.find(x => x.id == id);
            document.getElementById('aluno-id').value = a.id;
            document.getElementById('nome').value = a.nome;
            document.getElementById('data_matricula').value = a.data_matricula;
            document.getElementById('whatsapp').value = a.whatsapp || "";
            document.getElementById('valor').value = a.valor;
            document.getElementById('btn-cancelar').classList.remove('hidden');
            switchTab('cadastro');
        }
        function filtrarTabela(v, tId) {
            const s = v.toLowerCase();
            document.querySelectorAll(`#${tId} tr, #${tId} li, #${tId} div`).forEach(l => l.style.display = l.innerText.toLowerCase().includes(s) ? '' : 'none');
        }

        // Inicialização
        carregarDadosNuvem();
        renderDashboard();
        renderFinanceiro();
        renderRelatorios();
    </script>
</body>
</html>
